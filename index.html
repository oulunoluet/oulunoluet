<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oulun oluthinnat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍺</text></svg>">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #f0f0f0;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 { color: #ffffff; text-align: center; margin-bottom: 20px; }

    .header-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    /* Välilehtien tyylit */
    .tab-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .tab-btn {
      background: #2a2a2a;
      color: #888;
      border: 1px solid #444;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: #ff6600;
      color: white;
      border-color: #ff884d;
    }

    .info-header { 
      text-align: center; 
      font-size: 0.9em; 
      color: #888; 
      margin-bottom: 20px; 
    }

    .update-date {
      color: #ffaa66;
      font-weight: bold;
    }

    /* Taulukon tyylit */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      background: #1e1e1e;
      border-radius: 10px;
      border: 1px solid #333;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #333;
      padding: 12px;
      text-align: center;
    }

    th { 
      background: #2a2a2a; 
      color: #aaa; 
      text-transform: uppercase; 
      font-size: 0.85em; 
    }
    
    tr:hover {
      background: #2f2f2f;
    }

    /* Hakukenttä */
    .search-box { margin-bottom: 20px; text-align: center; }
    .search-box input {
      padding: 12px 20px;
      width: 300px;
      border-radius: 25px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
    }

    .search-box input:focus {
      outline: none;
      border-color: #ff6600;
    }

    /* Ilmoita-nappi */
    .suggestion-btn {
      background: #ff6600;
      color: white;
      border: none;
      padding: 12px 24px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
    }

    .suggestion-btn:hover {
      background: #ff884d;
    }

    /* Summary-rivi (Alarivi) */
    .summary-row { 
      background: #1a3a1a; 
      font-weight: bold; 
    }
    .summary-label { 
      text-align: right; 
    }
    .summary-value { 
      background: #00ff66 !important; 
      color: #000 !important; 
      font-size: 1.1em;
    }

    #hh-container { display: none; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
    }

    .modal-content {
      background-color: #1e1e1e;
      margin: 10% auto;
      padding: 25px;
      border: 2px solid #ff6600;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      color: #f0f0f0;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .close:hover { color: #ff6600; }

    .modal h2 { margin-top: 0; color: #ff884d; }

    .modal input, .modal select, .modal textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #2a2a2a;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .modal button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .search-box input { width: 85%; }
      th, td { padding: 8px 5px; font-size: 0.9em; }
      .summary-label { font-size: 0.8em; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-top">
    <h1>🍺 Oulun oluthinnat</h1>
    <button class="suggestion-btn" id="suggestionBtn">📝 Ilmoita muutoksesta</button>
  </div>

  <div class="tab-container">
    <button onclick="naytaOsio('hinnasto')" id="btn-hinnasto" class="tab-btn active">💰 Hinnasto</button>
    <button onclick="naytaOsio('happyhour')" id="btn-happyhour" class="tab-btn">⏰ Happy Hour</button>
  </div>

  <div class="info-header">
    <p><span class="update-date">Päivitetty: 10.5.2026</span></p>
    <p id="info-text">Sivulla näkyvät hinnat ovat baarien normaalihintoja.</p>
  </div>

  <div id="hinnasto-container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Hae baaria tai olutta...">
    </div>
    <div class="table-wrapper">
      <table id="taulukko">
        <thead>
          <tr>
            <th>Baari</th>
            <th>Olut</th>
            <th>Koko (l)</th>
            <th>Hinta (€)</th>
            <th>€/l</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="hh-container">
    <div class="table-wrapper">
      <table id="hh-taulukko">
        <thead>
          <tr>
            <th>Baari</th>
            <th>Tarjous</th>
            <th>Milloin voimassa</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="3">Ladataan tietoja...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="suggestionModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Ilmoita muutoksesta</h2>
    <p>Lähetä ehdotuksesi sähköpostilla:</p>
    <select id="type">
      <option value="hintamuutos">Hintamuutos</option>
      <option value="happyhour">Uusi Happy Hour</option>
      <option value="uusi_baari">Uusi baari</option>
      <option value="poisto">Baarin poisto</option>
      <option value="muu">Muu</option>
    </select>
    <textarea id="details" rows="4" placeholder="Baarin nimi, olut, koko, hinta..."></textarea>
    <input type="email" id="email" placeholder="Sähköpostisi (vapaaehtoinen)">
    <button id="sendEmailBtn">Lähetä ehdotus</button>
  </div>
</div>

<script>
// --- GLOBAALIT MUUTTUJAT ---
var kaikkiBaarit = [];
var hhLadattu = false;

// --- MODAL TOIMINNALLISUUS ---
var modal = document.getElementById("suggestionModal");
var btn = document.getElementById("suggestionBtn");
var span = document.getElementsByClassName("close")[0];

btn.onclick = function() { modal.style.display = "block"; }
span.onclick = function() { modal.style.display = "none"; }
window.onclick = function(event) {
  if (event.target == modal) modal.style.display = "none";
}

document.getElementById("sendEmailBtn").onclick = function() {
  var type = document.getElementById("type").value;
  var details = document.getElementById("details").value;
  var email = document.getElementById("email").value;
  var typeText = document.getElementById("type").options[document.getElementById("type").selectedIndex].text;
  
  var body = "Hei\n\nIlmoitan sivustolle:\n\nTyyppi: " + typeText + "\n\nTiedot:\n" + details + (email ? "\n\nLähettäjä: " + email : "");
  var mailtoLink = "mailto:oulunoluet@gmail.com?subject=Oluthintaehdotus: " + typeText + "&body=" + encodeURIComponent(body);
  window.location.href = mailtoLink;
  modal.style.display = "none";
  document.getElementById("details").value = "";
  document.getElementById("email").value = "";
}

// --- OSIOIDEN VAIHTO ---
function naytaOsio(osio) {
  const hCont = document.getElementById('hinnasto-container');
  const hhCont = document.getElementById('hh-container');
  const btnH = document.getElementById('btn-hinnasto');
  const btnHH = document.getElementById('btn-happyhour');
  const infoText = document.getElementById('info-text');

  if (osio === 'hinnasto') {
    hCont.style.display = 'block';
    hhCont.style.display = 'none';
    btnH.classList.add('active');
    btnHH.classList.remove('active');
    infoText.innerText = "Sivulla näkyvät hinnat ovat baarien normaalihintoja.";
  } else {
    hCont.style.display = 'none';
    hhCont.style.display = 'block';
    btnH.classList.remove('active');
    btnHH.classList.add('active');
    infoText.innerText = "Tässä näet baarien Happy Hour tarjoukset. HUOM! Tiedot vaihtuvat nopeasti eivätkä välttämättä ole ajan tasalla";
    if (!hhLadattu) lataaHappyHour();
  }
}

// --- HAPPY HOUR LATAUS ---
function lataaHappyHour() {
  fetch("happyhour.csv")
    .then(function(response) { if(!response.ok) throw new Error(); return response.text(); })
    .then(function(data) {
      var rows = data.split("\n").slice(1);
      var tbody = document.querySelector("#hh-taulukko tbody");
      tbody.innerHTML = "";
      
      rows.forEach(function(row) {
        if (!row.trim()) return;
        var parts = row.indexOf(";") !== -1 ? row.split(";") : row.split(",");
        if (parts.length < 2) return;
        var tr = document.createElement("tr");
        tr.innerHTML = '<td><strong>' + escapeHtml(parts[0]) + '</strong></td>' +
                       '<td>' + escapeHtml(parts[1]) + '</td>' +
                       '<td>' + escapeHtml(parts[2] || "") + '</td>';
        tbody.appendChild(tr);
      });
      hhLadattu = true;
    })
    .catch(function() {
      document.querySelector("#hh-taulukko tbody").innerHTML = "<tr><td colspan='3'>Ei Happy Hour -tietoja saatavilla.</td></tr>";
    });
}

// --- HINNASTON PÄIVITYS JA VÄRITYS ---
function paivitaTaulukko(data) {
  var tbody = document.querySelector("#taulukko tbody");
  tbody.innerHTML = "";
  
  if (data.length === 0) {
    tbody.innerHTML = "<tr><td colspan='5'>🔍 Ei hakutuloksia</td></tr>";
    return;
  }

  data.sort(function(a, b) { return a.litrahinta - b.litrahinta; });
  
  var min = data[0].litrahinta;
  var max = data[data.length - 1].litrahinta;
  
  function getColor(v) {
    var ratio = (v - min) / (max - min || 1);
    var r = Math.floor(255 * ratio);
    var g = Math.floor(255 * (1 - ratio));
    return "rgb(" + r + ", " + g + ", 100)";
  }
  
  for (var j = 0; j < data.length; j++) {
    var item = data[j];
    var tr = document.createElement("tr");
    var color = getColor(item.litrahinta);
    
    if (j === 0) tr.style.borderLeft = "5px solid gold";
    
    tr.innerHTML = '<td><strong>' + escapeHtml(item.baari) + '</strong></td>' +
                   '<td>' + escapeHtml(item.tyyppi) + '</td>' +
                   '<td>' + item.koko.toFixed(2) + ' l</td>' +
                   '<td>' + item.hinta.toFixed(2) + ' €</td>' +
                   '<td style="background:' + color + '; font-weight:bold; color:#000;">' + item.litrahinta.toFixed(2) + '</td>';
    tbody.appendChild(tr);
  }
  
// KAPEAMPI VERSIO: Baarin nimi siirretty vasemmalle, hinta kapeassa sarakkeessa
var summary = document.createElement("tr");
  summary.style.backgroundColor = "#1a3a1a";
  summary.style.fontWeight = "bold";
  
  summary.innerHTML = '<td colspan="4" style="padding: 12px; border: 1px solid #333;">' +
                      '<div style="display: flex; align-items: center; justify-content: center; gap: 10px; line-height: 1;">' +
                      '<span style="display: flex; align-items: center;">🏆 Halvin litrahinta:</span>' +
                      '<span style="color:#ffaa66; display: flex; align-items: center;">' + escapeHtml(data[0].baari) + '</span>' +
                      '</div>' +
                      '</td>' +
                      '<td style="text-align:center; background:#00ff66; color:#000; font-size:1.1em; border: 1px solid #333; width: 100px; min-width: 100px; vertical-align: middle;">' +
                      data[0].litrahinta.toFixed(2) + ' €/l' +
                      '</td>';
  
  tbody.appendChild(summary);
}

// --- HAKUTOIMINTO ---
function haeBaareja() {
  var hakusana = document.getElementById("searchInput").value.toLowerCase();
  var suodatetut = kaikkiBaarit.filter(function(baari) {
    return baari.baari.toLowerCase().indexOf(hakusana) !== -1 || baari.tyyppi.toLowerCase().indexOf(hakusana) !== -1;
  });
  paivitaTaulukko(suodatetut);
}

// --- ALKULATAUS (baarit.csv) ---
fetch("baarit.csv")
  .then(function(response) {
    if (!response.ok) throw new Error("Virhe");
    return response.text();
  })
  .then(function(data) {
    var rows = data.split("\n").slice(1);
    var beers = [];
    
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      if (!row.trim()) continue;
      var parts = row.indexOf(";") !== -1 ? row.split(";") : row.split(",");
      if (parts.length < 4) continue;
      
      var baari = parts[0].trim();
      var tyyppi = parts[1].trim();
      var koko = parseFloat(parts[2].trim().replace(",", "."));
      var hinta = parseFloat(parts[3].trim().replace(",", "."));
      
      if (!isNaN(koko) && !isNaN(hinta) && koko > 0) {
        beers.push({ baari: baari, tyyppi: tyyppi, koko: koko, hinta: hinta, litrahinta: hinta / koko });
      }
    }
    
    kaikkiBaarit = beers;
    paivitaTaulukko(kaikkiBaarit);
    
    document.getElementById("searchInput").addEventListener("keyup", haeBaareja);
  })
  .catch(function(err) {
    console.error(err);
    document.querySelector("#taulukko tbody").innerHTML = "<tr><td colspan='5'>❌ Virhe: baarit.csv puuttuu</td></tr>";
  });

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
</script>

</body>
</html>
